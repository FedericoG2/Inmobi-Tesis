    <text x="8" y="72" font-family="Consolas, monospace" font-size="10" fill="#000">- nombreCompleto: String</text>
    <text x="8" y="86" font-family="Consolas, monospace" font-size="10" fill="#000">- dniCuit: String</text>
    <text x="8" y="100" font-family="Consolas, monospace" font-size="10" fill="#000">- telefono: String</text>
