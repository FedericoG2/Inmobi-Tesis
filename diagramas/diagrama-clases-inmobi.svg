    <text x="12" y="60" font-family="Consolas, monospace" font-size="10" fill="#000">EstadoPropiedad</text>
    <text x="12" y="76" font-family="Consolas, monospace" font-size="10" fill="#000">EstadoReclamo</text>
    <text x="12" y="92" font-family="Consolas, monospace" font-size="10" fill="#000">CategoriaReclamo</text>
    <text x="12" y="108" font-family="Consolas, monospace" font-size="10" fill="#000">PrioridadReclamo</text>
    <text x="12" y="124" font-family="Consolas, monospace" font-size="10" fill="#000">TipoDocumento</text>
    <text x="12" y="140" font-family="Consolas, monospace" font-size="10" fill="#000">TipoIndice</text>
    <text x="12" y="156" font-family="Consolas, monospace" font-size="10" fill="#000">TipoAjuste</text>
