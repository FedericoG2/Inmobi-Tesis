    <text x="8" y="48" font-family="Consolas, monospace" font-size="10" fill="#000">+ obtenerContratosParaAumento(dias)</text>
    <text x="8" y="66" font-family="Consolas, monospace" font-size="10" fill="#000">+ calcularAumentoLote(contratos)</text>
    <text x="8" y="84" font-family="Consolas, monospace" font-size="10" fill="#000">+ aplicarAumentosEnLote(aumentos)</text>
