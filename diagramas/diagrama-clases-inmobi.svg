    <rect width="240" height="26" fill="#f5f5f5" stroke="#000" stroke-width="1.5" stroke-dasharray="8 4"/>
    <text x="120" y="18" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#000">GestorAumentos (servicio)</text>
