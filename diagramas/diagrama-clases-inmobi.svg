    <line x1="0" y1="26" x2="200" y2="26" stroke="#000"/>
    <text x="8" y="44" font-family="Consolas, monospace" font-size="10" fill="#000">- id: UUID</text>
    <text x="8" y="58" font-family="Consolas, monospace" font-size="10" fill="#000">- email: String</text>
    <text x="8" y="72" font-family="Consolas, monospace" font-size="10" fill="#000">- rol: RolUsuario</text>
    <text x="8" y="86" font-family="Consolas, monospace" font-size="10" fill="#000">- fechaCreacion: DateTime</text>
  </g>

  <g transform="translate(280, 72)">
