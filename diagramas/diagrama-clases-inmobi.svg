    <text x="108" y="200" font-size="10" font-weight="600">1</text>
    <text x="152" y="200" font-size="10" font-weight="600">0..1</text>
    <text x="168" y="198" font-size="10" font-style="italic" fill="#333">tiene</text>

    <line x1="380" y1="175" x2="380" y2="218" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="348" y="200" font-size="10" font-weight="600">1</text>
    <text x="392" y="200" font-size="10" font-weight="600">1..*</text>
    <text x="408" y="198" font-size="10" font-style="italic" fill="#333">posee</text>

    <line x1="140" y1="370" x2="520" y2="430" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="280" y="388" font-size="10" font-weight="600">1</text>
    <text x="480" y="418" font-size="10" font-weight="600">0..*</text>
    <text x="300" y="408" font-size="10" font-style="italic" fill="#333">firma</text>

    <line x1="380" y1="370" x2="600" y2="430" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="460" y="388" font-size="10" font-weight="600">1</text>
    <text x="580" y="418" font-size="10" font-weight="600">0..*</text>
    <text x="490" y="428" font-size="10" font-style="italic" fill="#333">se alquila en</text>

    <line x1="340" y1="370" x2="180" y2="680" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="240" y="510" font-size="10" font-weight="600">1</text>
    <text x="188" y="660" font-size="10" font-weight="600">0..*</text>
    <text x="248" y="530" font-size="10" font-style="italic" fill="#333">registra</text>

