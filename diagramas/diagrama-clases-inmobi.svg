    <line x1="1020" y1="175" x2="880" y2="680" stroke="#444" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#arrow-dash)"/>
    <text x="960" y="420" font-size="10" font-style="italic" fill="#333">genera</text>

