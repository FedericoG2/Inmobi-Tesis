    <text x="8" y="44" font-family="Consolas, monospace" font-size="10" fill="#000">- id: Long</text>
    <text x="8" y="58" font-family="Consolas, monospace" font-size="10" fill="#000">- nombreCompleto: String</text>
    <text x="8" y="72" font-family="Consolas, monospace" font-size="10" fill="#000">- dniCuit: String</text>
    <text x="8" y="86" font-family="Consolas, monospace" font-size="10" fill="#000">- telefono / email: String</text>
    <line x1="0" y1="90" x2="200" y2="90" stroke="#000"/>
    <text x="8" y="100" font-family="Consolas, monospace" font-size="10" fill="#000">+ crear() modificar() eliminar()</text>
