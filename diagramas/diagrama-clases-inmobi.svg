    <text x="8" y="44" font-family="Consolas, monospace" font-size="10" fill="#000">- id: Long</text>
    <text x="8" y="58" font-family="Consolas, monospace" font-size="10" fill="#000">- contratoId: Long</text>
    <text x="8" y="72" font-family="Consolas, monospace" font-size="10" fill="#000">- fechaAplicacion: Date</text>
