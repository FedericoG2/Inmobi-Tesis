<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inmobi — Diagrama de componentes</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 24px;
        background: #ffffff;
        color: #000000;
        font-family: 'Segoe UI', Arial, sans-serif;
      }
      h1 {
        margin: 0 0 20px;
        font-size: 1.35rem;
        text-align: center;
      }
      .wrap {
        overflow: auto;
        border: 1px solid #ccc;
        background: #fff;
      }
      img,
      object {
        display: block;
        max-width: none;
      }
    </style>
  </head>
  <body>
    <h1>Inmobi — Diagrama de componentes (UML)</h1>
    <div class="wrap">
      <object data="diagrama-componentes-inmobi.svg" type="image/svg+xml" width="1780" height="640">
        <img src="diagrama-componentes-inmobi.svg" alt="Diagrama de componentes Inmobi" width="1780" height="640" />
      </object>
    </div>
  </body>
</html>
