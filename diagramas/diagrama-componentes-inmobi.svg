<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1780 640" width="1780" height="640">
  <rect width="1780" height="640" fill="#ffffff"/>

  <text x="890" y="36" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#000000">Inmobi - Diagrama de componentes (UML)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#000000"/>
    </marker>
    <marker id="arrow-dash" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#444444"/>
    </marker>
  </defs>

  <!-- Navegador -->
  <g transform="translate(30, 250)">
    <rect width="100" height="70" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <text x="50" y="26" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#000">&lt;&lt;device&gt;&gt;</text>
    <text x="50" y="44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">Navegador</text>
    <text x="50" y="58" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#333">(Usuario)</text>
  </g>

  <!-- React container -->
  <rect x="150" y="58" width="1020" height="520" fill="#fafafa" stroke="#000" stroke-width="1.5"/>
  <text x="166" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#000">Aplicacion Inmobi (React + Vite)</text>

  <!-- AppRouter -->
  <g transform="translate(170, 185)">
    <rect width="120" height="95" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <rect x="0" y="0" width="14" height="95" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <rect x="3" y="12" width="8" height="20" fill="#fff" stroke="#000" stroke-width="1"/>
    <rect x="3" y="38" width="8" height="20" fill="#fff" stroke="#000" stroke-width="1"/>
    <text x="22" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">AppRouter</text>
    <text x="22" y="50" font-family="Consolas, monospace" font-size="9" fill="#333">routes / guards</text>
    <text x="22" y="66" font-family="Consolas, monospace" font-size="9" fill="#333">AdminRoute</text>
    <text x="22" y="80" font-family="Consolas, monospace" font-size="9" fill="#333">InquilinoRoute</text>
  </g>

  <!-- Admin (carril superior) -->
  <g transform="translate(340, 100)">
    <rect width="155" height="95" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <rect x="0" y="0" width="14" height="95" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <rect x="3" y="12" width="8" height="24" fill="#fff" stroke="#000" stroke-width="1"/>
    <rect x="3" y="42" width="8" height="24" fill="#fff" stroke="#000" stroke-width="1"/>
    <text x="22" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">Modulo Admin</text>
    <text x="22" y="48" font-family="Consolas, monospace" font-size="9" fill="#333">AdminLayout, dashboard</text>
    <text x="22" y="62" font-family="Consolas, monospace" font-size="9" fill="#333">CRUD, contratos,</text>
    <text x="22" y="76" font-family="Consolas, monospace" font-size="9" fill="#333">aumentos, reclamos</text>
  </g>

  <!-- Inquilino (carril medio) -->
  <g transform="translate(340, 235)">
    <rect width="155" height="85" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <rect x="0" y="0" width="14" height="85" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <rect x="3" y="12" width="8" height="22" fill="#fff" stroke="#000" stroke-width="1"/>
    <rect x="3" y="40" width="8" height="22" fill="#fff" stroke="#000" stroke-width="1"/>
    <text x="22" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">Modulo Inquilino</text>
    <text x="22" y="48" font-family="Consolas, monospace" font-size="9" fill="#333">InquilinoLayout</text>
    <text x="22" y="62" font-family="Consolas, monospace" font-size="9" fill="#333">dashboard, reclamos, nav</text>
  </g>

  <!-- Hooks -->
  <g transform="translate(540, 170)">
    <rect width="145" height="85" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <rect x="0" y="0" width="14" height="85" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <rect x="3" y="12" width="8" height="20" fill="#fff" stroke="#000" stroke-width="1"/>
    <rect x="3" y="38" width="8" height="20" fill="#fff" stroke="#000" stroke-width="1"/>
    <text x="22" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">Capa Hooks</text>
    <text x="22" y="52" font-family="Consolas, monospace" font-size="9" fill="#333">useReclamos</text>
    <text x="22" y="66" font-family="Consolas, monospace" font-size="9" fill="#333">useContratos, etc.</text>
  </g>

  <!-- Services -->
  <g transform="translate(730, 170)">
    <rect width="145" height="95" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <rect x="0" y="0" width="14" height="95" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <rect x="3" y="12" width="8" height="24" fill="#fff" stroke="#000" stroke-width="1"/>
    <rect x="3" y="42" width="8" height="24" fill="#fff" stroke="#000" stroke-width="1"/>
    <text x="22" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">Capa Services</text>
    <text x="22" y="48" font-family="Consolas, monospace" font-size="9" fill="#333">reclamos, contratos</text>
    <text x="22" y="62" font-family="Consolas, monospace" font-size="9" fill="#333">propiedades, aumentos</text>
    <text x="22" y="76" font-family="Consolas, monospace" font-size="9" fill="#333">arglyService</text>
  </g>

  <!-- Utils (carril superior) -->
  <g transform="translate(920, 100)">
    <rect width="125" height="65" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <rect x="0" y="0" width="14" height="65" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <text x="22" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">Utilidades</text>
    <text x="22" y="46" font-family="Consolas, monospace" font-size="9" fill="#333">contratoActivo, etc.</text>
  </g>

  <!-- Mock (carril medio-bajo) -->
  <g transform="translate(920, 255)">
    <rect width="125" height="60" fill="#fff" stroke="#444" stroke-width="1.5" stroke-dasharray="6 4"/>
    <rect x="0" y="0" width="14" height="60" fill="#f5f5f5" stroke="#444" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="22" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">Mock Data</text>
    <text x="22" y="44" font-family="Consolas, monospace" font-size="9" fill="#333">documentos (mock)</text>
  </g>

  <!-- AuthContext (carril inferior) -->
  <g transform="translate(170, 445)">
    <rect width="120" height="65" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <rect x="0" y="0" width="14" height="65" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <text x="22" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">AuthContext</text>
    <text x="22" y="46" font-family="Consolas, monospace" font-size="9" fill="#333">sesion + rol | LoginPage</text>
  </g>

  <!-- Supabase Client -->
  <g transform="translate(1100, 165)">
    <rect width="140" height="190" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <rect x="0" y="0" width="14" height="190" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <text x="22" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">Supabase Client</text>
    <text x="22" y="48" font-family="Consolas, monospace" font-size="9" fill="#333">supabaseClient.js</text>
    <text x="22" y="64" font-family="Consolas, monospace" font-size="9" fill="#333">@supabase/supabase-js</text>
    <line x1="0" y1="88" x2="140" y2="88" stroke="#ccc"/>
    <text x="22" y="104" font-family="Consolas, monospace" font-size="8" fill="#666">auth</text>
    <line x1="0" y1="120" x2="140" y2="120" stroke="#ccc"/>
    <text x="22" y="136" font-family="Consolas, monospace" font-size="8" fill="#666">CRUD / RPC</text>
    <line x1="0" y1="152" x2="140" y2="152" stroke="#ccc"/>
    <text x="22" y="168" font-family="Consolas, monospace" font-size="8" fill="#666">invoke</text>
  </g>

  <!-- Supabase platform -->
  <rect x="1280" y="58" width="320" height="520" fill="#f5f5f5" stroke="#000" stroke-width="1.5"/>
  <text x="1296" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#000">Supabase (BaaS - nube)</text>

  <g transform="translate(1300, 100)">
    <rect width="280" height="68" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">Auth</text>
    <text x="140" y="50" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#333">login | JWT | sesion</text>
  </g>

  <g transform="translate(1300, 230)">
    <rect width="280" height="80" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <text x="140" y="28" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">PostgreSQL</text>
    <text x="140" y="48" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#333">tablas | RLS | triggers | RPCs</text>
    <text x="140" y="64" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#333">confirmar_aumentos, calcular_aumentos...</text>
  </g>

  <g transform="translate(1300, 400)">
    <rect width="280" height="68" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <text x="140" y="30" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">Edge Functions</text>
    <text x="140" y="50" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#333">sync-argly-icl</text>
  </g>

  <!-- Argly -->
  <g transform="translate(1640, 398)">
    <rect width="110" height="72" fill="#fff" stroke="#444" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="55" y="26" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#000">&lt;&lt;externo&gt;&gt;</text>
    <text x="55" y="44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#000">Argly API</text>
    <text x="55" y="60" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#333">ICL / IPC</text>
  </g>

  <!-- Connections -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#333" stroke="#000" stroke-width="1.2" fill-opacity="1">
    <!-- Navegador -> AppRouter -->
    <line x1="130" y1="285" x2="170" y2="240" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="132" y="252" font-style="italic" fill="#333">HTTPS</text>

    <!-- AppRouter -> Admin (carril superior) -->
    <line x1="290" y1="210" x2="340" y2="148" stroke="#000" marker-end="url(#arrow)"/>
    <text x="296" y="168" font-style="italic" fill="#333">renderiza</text>

    <!-- AppRouter -> Inquilino (carril medio) -->
    <line x1="290" y1="250" x2="340" y2="278" stroke="#000" marker-end="url(#arrow)"/>
    <text x="296" y="272" font-style="italic" fill="#333">renderiza</text>

    <!-- Admin -> Hooks -->
    <line x1="495" y1="148" x2="540" y2="195" stroke="#000" marker-end="url(#arrow)"/>
    <text x="500" y="162" font-style="italic" fill="#333">usa</text>

    <!-- Inquilino -> Hooks -->
    <line x1="495" y1="278" x2="540" y2="230" stroke="#000" marker-end="url(#arrow)"/>
    <text x="500" y="262" font-style="italic" fill="#333">usa</text>

    <!-- Hooks -> Services (horizontal, mismo carril) -->
    <line x1="685" y1="212" x2="730" y2="212" stroke="#000" marker-end="url(#arrow)"/>
    <text x="692" y="204" font-style="italic" fill="#333">llama</text>

    <!-- Services -> Utils (sube, carril superior) -->
    <line x1="802" y1="195" x2="920" y2="133" stroke="#000" marker-end="url(#arrow)"/>

    <!-- Inquilino -> Mock (carril bajo, sin cruzar) -->
    <polyline points="495,310 900,310 920,285" fill="none" stroke="#444" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#arrow-dash)"/>
    <text x="660" y="302" font-style="italic" fill="#444">documentos</text>

    <!-- Services -> Supabase Client CRUD -->
    <line x1="875" y1="230" x2="1100" y2="285" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="960" y="248" font-style="italic" fill="#333">CRUD / RPC</text>

    <!-- AuthContext -> Supabase Client (carril inferior) -->
    <polyline points="290,477 1060,477 1060,253 1100,253" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="620" y="469" font-style="italic" fill="#333">auth</text>

    <!-- Services -> Supabase Client invoke (baja y va derecha) -->
    <polyline points="802,265 802,340 1060,340 1060,317 1100,317" fill="none" stroke="#000" marker-end="url(#arrow)"/>
    <text x="860" y="332" font-style="italic" fill="#333">invoke</text>

    <!-- Supabase Client -> Auth -->
    <line x1="1240" y1="253" x2="1280" y2="134" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="1248" y="188" font-style="italic" fill="#333">REST</text>

    <!-- Supabase Client -> PostgreSQL -->
    <line x1="1240" y1="285" x2="1280" y2="270" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Supabase Client -> Edge -->
    <line x1="1240" y1="317" x2="1280" y2="434" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Edge -> Argly -->
    <line x1="1580" y1="434" x2="1640" y2="434" stroke="#444" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#arrow-dash)"/>
    <text x="1588" y="426" font-style="italic" fill="#444">sync ICL</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 600)">
    <rect width="1720" height="28" fill="#fafafa" stroke="#000" stroke-width="1"/>
    <text x="16" y="19" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#000">Carriles: Admin (arriba) | Inquilino (medio) | Auth (abajo) | Flechas ortogonales para evitar cruces</text>
  </g>
</svg>
